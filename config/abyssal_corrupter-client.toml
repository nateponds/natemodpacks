[visuals]
	#Enable client camera shake from boss skills.
	screenShakeEnabled = true
	#Camera shake strength multiplier.
	# Default: 1.0
	# Range: 0.0 ~ 3.0
	screenShakeStrength = 1.0
	#Visual darkness strength used by the altar entrance sequence.
	# Default: 0.55
	# Range: 0.0 ~ 1.0
	entranceDarknessStrength = 0.55
	#Enable stronger boss bar coloring below 60% health.
	phaseTwoHudTint = true
